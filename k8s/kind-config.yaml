kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: avs-test
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30545
        hostPort: 8545
        protocol: TCP
      - containerPort: 30000
        hostPort: 4000
        protocol: TCP
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
