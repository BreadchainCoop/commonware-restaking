apiVersion: batch/v1
kind: Job
metadata:
  name: eigenlayer-setup
  namespace: commonware-avs
  labels:
    app: eigenlayer-setup
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: eigenlayer-setup
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-ethereum
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for ethereum to be ready..."
              until nc -z ethereum-svc 8545; do
                echo "Waiting for ethereum-svc:8545..."
                sleep 2
              done
              echo "Ethereum is ready!"
      containers:
        - name: eigenlayer
          image: ghcr.io/breadchaincoop/eigenlayer:dev
          envFrom:
            - configMapRef:
                name: env-config
          env:
            - name: RPC_URL
              value: "http://ethereum-svc:8545"
            - name: FORK_URL
              value: "https://ethereum-holesky.publicnode.com"
          volumeMounts:
            - name: nodes-data
              mountPath: /root/.nodes
            - name: config
              mountPath: /bls-middleware/contracts/docker/eigenlayer/config.json
              subPath: config.json
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: nodes-data
          persistentVolumeClaim:
            claimName: nodes-data
        - name: config
          configMap:
            name: avs-config
