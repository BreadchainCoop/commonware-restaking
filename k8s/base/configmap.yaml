apiVersion: v1
kind: ConfigMap
metadata:
  name: avs-config
  namespace: commonware-avs
data:
  config.json: |
    {
      "quorum": {
        "minimumStake": "1",
        "maxOperatorCount": 32,
        "kickBIPsOfOperatorStake": 10000,
        "kickBIPsOfTotalStake": 100
      },
      "metadata": {
        "uri": "metadataURI"
      },
      "operators": {
        "testacc1": {
          "socketAddress": "avs-node-0.avs-nodes.commonware-avs.svc.cluster.local:3001"
        },
        "testacc2": {
          "socketAddress": "avs-node-1.avs-nodes.commonware-avs.svc.cluster.local:3001"
        },
        "testacc3": {
          "socketAddress": "avs-node-2.avs-nodes.commonware-avs.svc.cluster.local:3001"
        }
      }
    }
  public_orchestrator.json: |
    {
      "g2_x1": "20265730220917057623326116620721648047640065506233168445998945605458084341755",
      "g2_x2": "1537141129484558011683382469842956131676085503509229854572844956364492197092",
      "g2_y1": "4380068110839997539835821427545270098552639074995346826656804866303457881635",
      "g2_y2": "479676018937294309080674601592141614301396550682703157902264620243097107417",
      "port": "3000",
      "address": "router"
    }
  # NOTE: router_orchestrator.json with privateKey is in secret.yaml for security
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: env-config
  namespace: commonware-avs
data:
  ENVIRONMENT: "LOCAL"
  CERBERUS_GRPC_PORT: "50051"
  CERBERUS_METRICS_PORT: "9081"
  SIGNER_ENDPOINT: "http://signer-svc:50051"
  TEST_ACCOUNTS: "3"
  INGRESS: "false"
  AGGREGATION_FREQUENCY: "30"
