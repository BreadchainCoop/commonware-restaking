apiVersion: v1
kind: Service
metadata:
  name: avs-nodes
  namespace: commonware-avs
  labels:
    app: avs-node
spec:
  selector:
    app: avs-node
  clusterIP: None
  ports:
    - name: grpc-0
      port: 3001
      targetPort: 3001
    - name: grpc-1
      port: 3002
      targetPort: 3001
    - name: grpc-2
      port: 3003
      targetPort: 3001
